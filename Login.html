<!DOCTYPE html>
<html>

<head>
    <title>Location Tracker Login</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>

    <div class="login-box">

        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="80">

        <h2>Location Tracker</h2>

        <!-- 
        Removed this due to the fact that it will override the url to be the one of local host instead of the backend server
        <form action="login" method="get">
        -->

        <input id="email" name="email" placeholder="Email" required>

        <input id="password" name="password" placeholder="Password" required>

        <button id="submit" type="submit">Login</button>

        </form>

    </div>
    <script src="script.js"></script>
</body>

</html>
