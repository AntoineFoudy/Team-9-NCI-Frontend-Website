<!DOCTYPE html>
<html>

<head>
    <title>Location Tracker Login</title>
    <link rel="stylesheet" href="Login.css">
</head>

<body>

    <div class="login-box">

        <!-- Icon -->
        <img src="https://cdn-icons-png.flaticon.com/512/684/684908.png" width="80">

        <h2>Log In</h2>

        <!-- Error message -->
        <p id="error" style="color:red; display:none;">
            Incorrect details
        </p>

        <!-- Inputs -->
        <input id="email" type="email" placeholder="Enter Email" required>

        <input id="password" type="password" placeholder="Enter Password" required>

        <!-- Log In button -->
        <button id="submit" type="button">Log In</button>

        <br><br>

        <!-- Sign Up button -->
        <button type="button" onclick="window.location.href='signup.html'">
            Sign Up
        </button>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
